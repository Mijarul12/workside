<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Marketing Course Application</title>
    <!-- Link to a modern datepicker library -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="digital-marketing-application-modern.css">
</head>
<body>
    <div class="form-container">
        <div class="header">
            <h2>Digital Marketing Course Application</h2>
            <p class="subtitle">Fill out the form to enroll in our Digital Marketing course.</p>
        </div>

        <form id="application-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <!-- The input type is changed to text to allow the datepicker to control it -->
                    <input type="text" id="dob" name="dob" placeholder="Select your date of birth" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="9876543210" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="john.doe@example.com" required>
                </div>
                 <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select your gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group address-group">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="123 Main St, Anytown" required></textarea>
                </div>
                <div class="form-group qualification-group">
                    <label for="qualification">Highest Qualification</label>
                    <input type="text" id="qualification" name="qualification" placeholder="e.g., B.Com, 12th Pass" required>
                </div>
            </div>
            <button type="submit" id="pay-btn" class="gradient-btn">Pay & Submit</button>
        </form>
    </div>

    <!-- Add the datepicker library script -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="digital-marketing-application.js"></script>
</body>
</html>
