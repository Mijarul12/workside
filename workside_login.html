<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Side - Login</title>
    <link rel="stylesheet" href="workside_login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <button class="nav-btn active">Student</button>
            <button class="nav-btn">Worker</button>
            <button class="nav-btn">Admin</button>
        </div>
        <div class="login-form">
            <img src="logo.png" alt="Work Side Company Logo" class="logo">
            <p class="welcome-text">Welcome to Work Side!</p>
            <p class="login-prompt">Log in to start working</p>
            <form>
                <div class="input-wrapper">
                    <i class="fa-regular fa-user"></i>
                    <input type="text" placeholder="Username">
                </div>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" placeholder="Password">
                    <i class="fa-regular fa-eye-slash"></i>
                </div>
                <button type="submit" class="login-btn">Log In ></button>
            </form>
            <div class="links">
                <a href="#">Forgot Password?</a>
                <a href="#">Create an Account</a>
            </div>
            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-icons">
                    <a href="#"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google"></a>
                    <a href="#"><i class="fab fa-facebook-f"></i></a>
                    <a href="#"><i class="fab fa-linkedin-in"></i></a>
                </div>
            </div>
            <div class="terms">
                <p>By continuing, you agree to our <a href="#">Terms and Conditions</a>.</p>
                <p>All payments are non-refundable.</p>
            </div>
        </div>
    </div>
</body>
</html>
