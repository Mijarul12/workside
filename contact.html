<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Work Side</title>
    <link rel="stylesheet" href="contact.css">
</head>
<body>
    <div class="contact-container">
        <h1>Contact Us</h1>
        <div class="contact-content">
            <div class="contact-form">
                <form>
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
            <div class="company-details">
                <h2>Company Details</h2>
                <p><strong>Company Name:</strong> Work Side</p>
                <p><strong>Toll-free number:</strong> 9593333333</p>
                <p><strong>Company email:</strong> helpworkside@gmail.com</p>
                <p><strong>Company address:</strong> 56/125, Bijayghar, Jadabpur, kolkata, 700032</p>
            </div>
        </div>
    </div>
    <script src="contact.js"></script>
</body>
</html>
