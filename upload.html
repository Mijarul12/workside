<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - Work Side</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="upload.css">
</head>
<body>
    <header>
        <p>Welcome to worksite... Worker Portal</p>
        <nav>
            <a href="worker_dashboard.html">Home</a>
            <a href="list.html">List</a>
            <a href="worker_wallet.html">Wallet</a>
            <a href="upload.html" class="active">Upload</a>
            <a href="login.html" class="logout-btn"><img src="https://img.icons8.com/ios-filled/50/ff0000/shutdown.png" alt="Logout"></a>
        </nav>
    </header>

    <main>
        <div class="upload-container">
            <h1>Upload Work</h1>
            <form class="upload-form">
                <div class="form-group">
                    <label for="work-title">Title</label>
                    <input type="text" id="work-title" placeholder="e.g., Math Assignment Solution">
                </div>
                <div class="form-group">
                    <label for="work-description">Description</label>
                    <textarea id="work-description" rows="4" placeholder="A brief description of the work..."></textarea>
                </div>
                <div class="form-group">
                    <label for="work-file">Upload File</label>
                    <input type="file" id="work-file">
                </div>
                <button type="submit" class="upload-btn">Upload</button>
            </form>
        </div>
    </main>

    <footer>
        <a href="terms.html">Term & Condition</a>
        <p>&copy; 2026 Work Side. All Rights Reserved.</p>
    </footer>
</body>
</html>
