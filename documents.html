<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents - Work Side</title>
    <link rel="stylesheet" href="dashboard.css"> 
    <link rel="stylesheet" href="documents.css">
</head>
<body>
    <header>
        <p>Welcome to worksite... Student Portal</p>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="list.html">List</a>
            <a href="documents.html" class="active">Documents</a>
            <a href="account.html">Account</a>
            <a href="wallet.html">Wallet</a>
            <a href="#" class="logout-btn"><img src="https://img.icons8.com/ios-filled/50/ff0000/shutdown.png" alt="Logout"></a>
        </nav>
    </header>

    <main>
        <div class="documents-container">
            <h1>Upload Your Documents</h1>
            <p>Please upload your pending assignments here.</p>

            <div class="upload-section">
                <form id="upload-form">
                    <div class="form-group">
                        <label for="assignment-name">Assignment Name</label>
                        <input type="text" id="assignment-name" placeholder="e.g., Physics Homework 1" required>
                    </div>
                    <div class="form-group">
                        <label for="file-upload">Select a file to upload</label>
                        <div class="file-input-wrapper">
                            <input type="file" id="file-upload" required>
                            <span class="file-input-label">Choose file...</span>
                        </div>
                    </div>
                    <button type="submit" class="upload-btn">Upload Assignment</button>
                </form>
            </div>

            <div class="uploaded-files">
                <h2>Pending Assignments</h2>
                <ul id="file-list">
                    <!-- Uploaded files will be listed here -->
                </ul>
            </div>
        </div>
    </main>

    <footer>
        <a href="terms.html">Term & Condition</a>
        <p>&copy; 2026 Work Side. All Rights Reserved.</p>
    </footer>
    <script src="documents.js"></script>
</body>
</html>
