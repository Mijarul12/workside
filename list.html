<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <main>
        <div class="project-list-container">
            <h1>Available Projects</h1>

                        <th>Project Name</th>
                        <th>Project ID</th>

                        <th>Download Answer</th>

                    </tr>
                </thead>
                <tbody>
                    <!-- Project rows will be dynamically inserted here by JavaScript -->
                </tbody>
            </table>
        </div>
