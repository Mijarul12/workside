<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Customer Request Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="customer-request.css">
</head>
<body>

<div class="form-container">
    <div class="header">
        <h2>Project Request Form</h2>
        <p class="subtitle">Complete the form below to start your digital journey.</p>
    </div>

    <form action="#" method="POST" enctype="multipart/form-data">
        <div class="form-grid">
            
            <div class="form-group">
                <label for="name">Customer Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required>
            </div>

            <div class="form-group">
                <label for="company">Company Name</label>
                <input type="text" id="company" name="company" placeholder="e.g. Acme Corp" required>
            </div>

            <div class="form-group">
                <label for="mobile">Primary Mobile</label>
                <input type="tel" id="mobile" name="mobile" placeholder="Required" required>
            </div>

            <div class="form-group">
                <label for="opt-mobile">Secondary Mobile</label>
                <input type="tel" id="opt-mobile" name="opt-mobile" placeholder="Required" required>
            </div>

            <div class="form-group full-width">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="hello@company.com" required>
            </div>

            <div class="form-group">
                <label for="web-type">Type of Website</label>
                <select id="web-type" name="web-type" required>
                    <option value="e-commerce">E-Commerce Store</option>
                    <option value="corporate">Corporate Website</option>
                    <option value="landing-page">Landing Page</option>
                    <option value="portfolio">Portfolio/Personal</option>
                    <option value="other">Other / Custom</option>
                </select>
            </div>

            <div class="form-group">
                <label>Urgency Level</label>
                <div class="urgency-container">
                    <div class="urgency-option">
                        <input type="radio" id="low" name="urgency" value="low">
                        <label for="low">Low</label>
                    </div>
                    <div class="urgency-option">
                        <input type="radio" id="medium" name="urgency" value="medium" checked>
                        <label for="medium">Medium</label>
                    </div>
                    <div class="urgency-option">
                        <input type="radio" id="high" name="urgency" value="high">
                        <label for="high">High</label>
                    </div>
                </div>
            </div>

            <div class="form-group full-width">
                <label for="subject">Subject</label>
                <input type="text" id="subject" name="subject" required>
            </div>

            <div class="form-group full-width">
                <label for="description">Detailed Description</label>
                <textarea id="description" name="description" placeholder="Briefly explain your needs..." required></textarea>
            </div>

            <div class="form-group full-width">
                <label for="attachment">Upload Project Brief / Files <span>(PDF, PNG, JPG)</span></label>
                <input type="file" id="attachment" name="attachment" required>
            </div>

        </div>

        <button type="submit">Send Request</button>
    </form>
</div>

<script src="customer-request.js"></script>
</body>
</html>
