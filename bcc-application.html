<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Computer Course (BCC) Application</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="bcc-application.css">
</head>
<body>
    <div class="form-container">
        <div class="header">
            <h2>Basic Computer Course (BCC) Application</h2>
            <p class="subtitle">Enroll in our 1-Year diploma course.</p>
        </div>

        <form id="bcc-form">
            <div class="form-grid">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" placeholder="e.g., Jane Doe" required>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="text" id="dob" name="dob" placeholder="Select your date of birth" required>
                </div>
                <div class="form-group">
                    <label for="gender">Gender</label>
                    <select id="gender" name="gender" required>
                        <option value="" disabled selected>Select gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="father-name">Father's Name</label>
                    <input type="text" id="father-name" name="father-name" placeholder="e.g., John Doe" required>
                </div>
                <div class="form-group full-width">
                    <label for="address">Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="123 Main St, Anytown, State, 12345" required></textarea>
                </div>
                <div class="form-group">
                    <label>Enrollment Type</label>
                    <div class="radio-group">
                        <label><input type="radio" name="enrollment-type" value="regular" checked> Regular</label>
                        <label><input type="radio" name="enrollment-type" value="unregular"> Unregular</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="qualification">Highest Qualification</label>
                    <input type="text" id="qualification" name="qualification" placeholder="e.g., 10th Pass, B.A." required>
                </div>
                <div class="form-group">
                    <label for="school-name">Last/Current School Name</label>
                    <input type="text" id="school-name" name="school-name" placeholder="e.g., Anytown High School" required>
                </div>
                <div class="form-group">
                    <label>Prior Computer Knowledge?</label>
                    <div class="radio-group">
                        <label><input type="radio" name="computer-knowledge" value="yes"> Yes</label>
                        <label><input type="radio" name="computer-knowledge" value="no" checked> No</label>
                    </div>
                </div>
            </div>
            <button type="submit" id="pay-btn" class="gradient-btn">Pay & Submit</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="bcc-application.js"></script>
</body>
</html>
