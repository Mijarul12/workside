<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Plan - Work Side</title>
    <link rel="stylesheet" href="buy_plan.css">
</head>
<body>
    <div class="container">
        <h1>Choose Your Plan</h1>
        <div class="plans">
            <div class="plan-card">
                <img src="silverplan.png" alt="Silver Plan">
                <h2>Silver Plan</h2>
                <p class="price">₹199</p>
                <button class="subscribe-btn" data-plan="silver" data-amount="19900">SUBSCRIBE NOW</button>
            </div>
            <div class="plan-card">
                <img src="goldenplan.png" alt="Golden Plan">
                <h2>Golden Plan</h2>
                <p class="price">₹499</p>
                <button class="subscribe-btn" data-plan="golden" data-amount="49900">SUBSCRIBE NOW</button>
            </div>
            <div class="plan-card">
                <img src="daimondplan.png" alt="Diamond Plan">
                <h2>Diamond Plan</h2>
                <p class="price">₹999</p>
                <button class="subscribe-btn" data-plan="diamond" data-amount="99900">SUBSCRIBE NOW</button>
            </div>
        </div>
    </div>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="buy_plan.js"></script>
</body>
</html>
