<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Login - Work Side</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="top-nav-bar">
        <a href="login.html" class="nav-btn">Student Login</a>
        <a href="worker_login.html" class="nav-btn active">Worker Login</a>
        <a href="admin_login.html" class="nav-btn">Admin Login</a>
    </div>
    <div class="login-wrapper">
        <div class="login-box">
            <div class="login-header-image"></div>
            <div class="login-body">
                <div class="title-container">
                    <h1>Worker Login</h1>
                    <p>Login to access your personalized dashboard</p>
                </div>
                <form id="login-form">
                    <div class="form-group">
                        <div class="input-with-icon">
                            <i class="fa-solid fa-at"></i>
                            <input type="email" id="email" placeholder="Email Address" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <div class="input-with-icon">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Password" required>
                            <i class="fa-regular fa-eye-slash toggle-password"></i>
                        </div>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <button type="submit" class="login-now-btn">Login Now</button>
                </form>
                <div class="footer-text">
                    <p>&copy; 2026 Work Side. All rights reserved.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
