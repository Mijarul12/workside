<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account - Work Side</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="account.css">
</head>
<body>
    <header>
        <p>Welcome to worksite... Student Portal</p>
        <nav>
            <a href="dashboard.html">Home</a>
            <a href="list.html">List</a>
            <a href="documents.html">Documents</a>
            <a href="account.html" class="active">Account</a>
            <a href="wallet.html">Wallet</a>
            <a href="#" class="logout-btn"><img src="https://img.icons8.com/ios-filled/50/ff0000/shutdown.png" alt="Logout"></a>
        </nav>
    </header>

    <main>
        <div class="account-container">
            <h1>Account Information</h1>

            <div class="account-details">
                <h2>Profile</h2>
                <p><strong>Name:</strong> <span id="student-name">Student</span></p>
                <p><strong>Email:</strong> <span id="student-email">Student@gmail.com</span></p>
            </div>

            <div class="password-change-section">
                <h2>Change Password</h2>
                <form id="password-change-form">
                    <div class="form-group">
                        <label for="current-password">Current Password</label>
                        <input type="password" id="current-password" required>
                    </div>
                    <div class="form-group">
                        <label for="new-password">New Password</label>
                        <input type="password" id="new-password" required>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm New Password</label>
                        <input type="password" id="confirm-password" required>
                    </div>
                    <button type="submit" class="change-password-btn">Change Password</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <a href="terms.html">Term & Condition</a>
        <p>&copy; 2026 Work Side. All Rights Reserved.</p>
    </footer>
    <script src="account.js"></script>
</body>
</html>
