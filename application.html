<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="application.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>
<body>
    <div class="form-container">
        <form id="registrationForm">
            <h2>Registration</h2>
            <div class="input-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" placeholder="John Doe" required>
            </div>
            <div class="input-group">
                <label for="phone">Mobile Number</label>
                <input type="tel" id="phone" placeholder="+91 XXXXX-XXXXX" required>
            </div>
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="name@email.com" required>
            </div>
            <div class="input-group">
                <label for="aadhar">Aadhar Number</label>
                <input type="text" id="aadhar" placeholder="XXXX XXXX XXXX" required>
            </div>
            <div class="input-group">
                <label for="referCode">Refer Code (Optional)</label>
                <input type="text" id="referCode" placeholder="Enter referral code">
            </div>
            <button type="submit" class="btn submit-btn">Submit</button>
        </form>
    </div>
    <script src="application.js"></script>
</body>
</html>
